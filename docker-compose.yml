services:
  db:
    image: postgres:16
    container_name: nanobot-postgres
    environment:
      POSTGRES_DB: nanobot_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sQYV5120N3wJRceig1ZXIw==
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: nanobot-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://postgres:sQYV5120N3wJRceig1ZXIw==@db:5432/nanobot_prod
      DATABASE_NAME: nanobot_prod
      DB_USER: postgres
      DB_PASSWORD: sQYV5120N3wJRceig1ZXIw==
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./repos:/app/repos

volumes:
  pgdata:
